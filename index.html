<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Segawon Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            color: #ffcc00;
            text-shadow: 2px 2px #000;
        }
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .info {
            margin-top: 15px;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>SUPER SEGAWON ADVENTURE</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="info">
        <p>Tekan tombol <strong>SPASI</strong> atau <strong>KLIK LAYAR</strong> untuk Melompat!</p>
        <p>Hindari Lebah Madu Ungu yang mendekat!</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Variabel Game
        let score = 0;
        let gameOver = false;

        // Karakter Segawon (Beruang)
        const segawon = {
            x: 50,
            y: 300,
            width: 50,
            height: 50,
            color: "#8B4513", // Cokelat Beruang
            jumpForce: 15,
            gravity: 0.6,
            velocity: 0,
            isJumping: false
        };

        // Musuh (Lebah Madu Ungu)
        const enemy = {
            x: 900,
            y: 310,
            width: 40,
            height: 40,
            color: "#8A2BE2", // Ungu Madu
            speed: 6
        };

        // Handle Input Lompat
        function jump() {
            if (!segawon.isJumping && !gameOver) {
                segawon.velocity = -segawon.jumpForce;
                segawon.isJumping = true;
            }
            if (gameOver) {
                resetGame();
            }
        }

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") jump();
        });
        canvas.addEventListener("click", jump);

        // Reset Game saat Kalah
        function resetGame() {
            score = 0;
            gameOver = false;
            enemy.x = 900;
            enemy.speed = 6;
            segawon.y = 300;
            segawon.velocity = 0;
            segawon.isJumping = false;
            requestAnimationFrame(update);
        }

        // Loop Game Utama
        function update() {
            if (gameOver) return;

            // 1. Logika Gravitasi & Lompatan Segawon
            segawon.velocity += segawon.gravity;
            segawon.y += segawon.velocity;

            // Membatasi agar tidak tembus tanah (Lantai di y = 300)
            if (segawon.y >= 300) {
                segawon.y = 300;
                segawon.velocity = 0;
                segawon.isJumping = false;
            }

            // 2. Logika Pergerakan Musuh
            enemy.x -= enemy.speed;
            if (enemy.x < -enemy.width) {
                enemy.x = 850 + Math.random() * 200; // Reset posisi musuh di kanan luar layar
                score++;
                enemy.speed += 0.5; // Game semakin lama semakin cepat
            }

            // 3. Deteksi Tabrakan (Collision Detection)
            if (
                segawon.x < enemy.x + enemy.width &&
                segawon.x + segawon.width > enemy.x &&
                segawon.y < enemy.y + enemy.height &&
                segawon.y + segawon.height > enemy.y
            ) {
                gameOver = true;
            }

            // 4. Proses Menggambar Objek di Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Menggambar Tanah/Rumput
            ctx.fillStyle = "#228B22";
            ctx.fillRect(0, 350, canvas.width, 50);

            // Menggambar Segawon (Karakter)
            ctx.fillStyle = segawon.color;
            ctx.fillRect(segawon.x, segawon.y, segawon.width, segawon.height);
            // Detail Telinga Segawon
            ctx.fillRect(segawon.x + 5, segawon.y - 10, 12, 10);
            ctx.fillRect(segawon.x + 33, segawon.y - 10, 12, 10);

            // Menggambar Lebah Madu Ungu (Musuh)
            ctx.fillStyle = enemy.color;
            ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

            // Menggambar Skor
            ctx.fillStyle = "#000";
            ctx.font = "20px Arial";
            ctx.fillText("Skor: " + score, 20, 30);

            // Tampilan Game Over
            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#ff2222";
                ctx.font = "40px Arial";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);

                ctx.fillStyle = "#fff";
                ctx.font = "20px Arial";
                ctx.fillText("Klik atau Tekan Spasi untuk Main Lagi", canvas.width / 2, canvas.height / 2 + 30);
                ctx.textAlign = "left"; // Reset alignment
                return;
            }

            requestAnimationFrame(update);
        }

        // Jalankan Game pertama kali
        update();
    </script>
</body>
</html>
