<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Segawon - 2D Arcade Platformer</title>
    <style>
        body {
            background-color: #111216;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
        }
        h1 {
            color: #ffbc42;
            margin-bottom: 5px;
            text-shadow: 2px 2px #000;
            font-size: 24px;
        }
        .instruksi {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
            text-align: center;
            background: #20212b;
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid #333;
        }
        #gameCanvas {
            background: #34495e;
            border: 4px solid #474a5e;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            transition: filter 0.3s ease;
        }
        /* Efek visual ketika Sniff Mode Aktif */
        .sniff-visual {
            filter: grayscale(100%);
        }
        .hud {
            width: 800px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            color: #ffbc42;
        }
    </style>
</head>
<body>

    <h1>🐕 SUPER SEGAWON: RUN & JUMP 🐕</h1>
    <div class="instruksi">
        <strong>Kontrol:</strong> [← / A] Kiri | [→ / D] Kanan | [↑ / W / Spasi] Lompat | <strong>[S] Aktifkan Sniff Mode (Cari Tulang Gaib)</strong>
    </div>

    <!-- Area Layar Game Real-time -->
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="hud">
        <div>🦴 Tulang Emas: <span id="scoreText">0</span> / 5</div>
        <div>HP: <span id="hpText">100</span>%</div>
        <div>Status Sniff: <span id="sniffText" style="color: #ef476f;">OFF</span></div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- GAME STATE VARIABLES ---
    let score = 0;
    let gameOver = false;
    let gameWon = false;

    // Object Wongi (Karakter Utama)
    const wongi = {
        x: 50,
        y: 300,
        width: 40,
        height: 30,
        speed: 5,
        velX: 0,
        velY: 0,
        jumping: false,
        grounded: false,
        hp: 100,
        sniffMode: false,
        color: '#e67e22' // Warna oranye anjing kampung
    };

    // Lingkungan & Rintangan
    const gravity = 0.6;
    const friction = 0.85;

    const platforms = [
        { x: 0, y: 370, width: 800, height: 30, color: '#27ae60' },     // Tanah dasar (Sawah Hijau)
        { x: 200, y: 280, width: 120, height: 15, color: '#d35400' },   // Platform 1
        { x: 400, y: 200, width: 150, height: 15, color: '#d35400' },   // Platform 2
        { x: 650, y: 270, width: 100, height: 15, color: '#d35400' }    // Platform 3
    ];

    // Daftar Item Tulang Emas (Sebagian hanya terlihat saat Sniff Mode)
    const bones = [
        { x: 250, y: 240, width: 15, height: 10, collected: false, secret: false },
        { x: 470, y: 160, width: 15, height: 10, collected: false, secret: false },
        { x: 700, y: 230, width: 15, height: 10, collected: false, secret: false },
        // Tulang rahasia (Hanya bisa diambil/dilihat kalau Sniff Mode aktif)
        { x: 120, y: 330, width: 15, height: 10, collected: false, secret: true },
        { x: 350, y: 330, width: 15, height: 10, collected: false, secret: true }
    ];

    // Musuh: Pasukan Babi Hutan (Celeng) berpatroli
    const enemies = [
        { x: 300, y: 340, width: 35, height: 30, speed: 2, range: 100, startX: 300, direction: 1 },
        { x: 600, y: 340, width: 35, height: 30, speed: 3, range: 120, startX: 600, direction: 1 }
    ];

    // Input Keyboard Tracker
    const keys = [];

    // --- CONTROLLERS & EVENT LISTENERS ---
    window.addEventListener('keydown', function (e) {
        keys[e.keyCode] = true;
        // Tombol S untuk mengaktifkan/mematikan Sniff Mode secara dinamis
        if (e.keyCode === 83 && !gameOver && !gameWon) {
            wongi.sniffMode = !wongi.sniffMode;
            if (wongi.sniffMode) {
                canvas.classList.add('sniff-visual');
                document.getElementById('sniffText').innerText = "ON (MONOKROM)";
                document.getElementById('sniffText').style.color = "#2ecc71";
            } else {
                canvas.classList.remove('sniff-visual');
                document.getElementById('sniffText').innerText = "OFF";
                document.getElementById('sniffText').style.color = "#ef476f";
            }
        }
    });

    window.addEventListener('keyup', function (e) {
        keys[e.keyCode] = false;
    });

    // --- GAME ENGINE LOGIC ---
    function update() {
        if (gameOver || gameWon) return;

        // Gerakan Horizontal (Kanan / Kiri)
        if (keys[39] || keys[68]) { // Kanan atau D
            if (wongi.velX < wongi.speed) wongi.velX++;
        }
        if (keys[37] || keys[65]) { // Kiri atau A
            if (wongi.velX > -wongi.speed) wongi.velX--;
        }

        // Gerakan Vertikal (Melompat)
        if ((keys[38] || keys[87] || keys[32]) && !wongi.jumping && wongi.grounded) { // Atas, W, atau Spasi
            wongi.jumping = true;
            wongi.grounded = false;
            wongi.velY = -wongi.speed * 2.5; // Kekuatan lompatan
        }

        // Mengaplikasikan Hambatan udara (Friction) & Gravitasi
        wongi.velX *= friction;
        wongi.velY += gravity;

        // Update Posisi Wongi
        wongi.x += wongi.velX;
        wongi.y += wongi.velY;

        // Batas Peta (Agar tidak keluar layar kiri/kanan)
        if (wongi.x >= canvas.width - wongi.width) wongi.x = canvas.width - wongi.width;
        if (wongi.x <= 0) wongi.x = 0;

        // --- COLLISION DETECTION (Sistem Tabrakan Platform) ---
        wongi.grounded = false;
        for (let i = 0; i < platforms.length; i++) {
            let plat = platforms[i];
            
            // Cek arah tabrakan menggunakan Intersect AABB
            if (wongi.x < plat.x + plat.width && wongi.x + wongi.width > plat.x &&
                wongi.y < plat.y + plat.height && wongi.y + wongi.height > plat.y) {
                
                // Jika jatuh menapak di atas platform
                if (wongi.velY > 0 && (wongi.y + wongi.height - wongi.velY) <= plat.y) {
                    wongi.grounded = true;
                    wongi.jumping = false;
                    wongi.y = plat.y - wongi.height;
                    wongi.velY = 0;
                }
            }
        }

        // --- SISTEM UPDATE MUSUH (PATROLI & HITBOX DAMAGE) ---
        for (let i = 0; i < enemies.length; i++) {
            let enemy = enemies[i];
            // Gerak mondar-mandir otomatis
            enemy.x += enemy.speed * enemy.direction;
            if (Math.abs(enemy.x - enemy.startX) > enemy.range) {
                enemy.direction *= -1; // Balik arah jika mencapai batas jangkauan
            }

            // Tabrakan Wongi dengan Musuh
            if (wongi.x < enemy.x + enemy.width && wongi.x + wongi.width > enemy.x &&
                wongi.y < enemy.y + enemy.height && wongi.y + wongi.height > enemy.y) {
                
                wongi.hp -= 1.5; // Mengurangi HP Wongi secara berkala selama bersentuhan
                wongi.velY = -6; // Memberikan efek mental/dorong ke atas sedikit
                wongi.velX = enemy.direction * 5; 
                
                if (wongi.hp <= 0) {
                    wongi.hp = 0;
                    gameOver = true;
                }
            }
        }

        // --- SISTEM ITEM TULANG (COLLECTIBLES) ---
        for (let i = 0; i < bones.length; i++) {
            let bone = bones[i];
            
            // Jika rahasia, hanya bisa diambil sewaktu Sniff Mode Menyala
            if (bone.secret && !wongi.sniffMode) continue;

            if (!bone.collected &&
                wongi.x < bone.x + bone.width && wongi.x + wongi.width > bone.x &&
                wongi.y < bone.y + bone.height && wongi.y + wongi.height > bone.y) {
                
                bone.collected = true;
                score++;
                if (score >= 5) {
                    gameWon = true;
                }
            }
        }

        // Update teks antarmuka (HUD) HTML
        document.getElementById('scoreText').innerText = score;
        document.getElementById('hpText').innerText = Math.floor(wongi.hp);
    }

    // --- ART & RENDERING GRAPHICS ---
    function draw() {
        // Bersihkan layar canvas di setiap frame baru
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Gambar Background Langit/Sawah
        ctx.fillStyle = wongi.sniffMode ? '#1e1e1e' : '#34495e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Gambar Seluruh Platform Objek
        for (let i = 0; i < platforms.length; i++) {
            let plat = platforms[i];
            ctx.fillStyle = wongi.sniffMode ? '#444' : plat.color;
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        }

        // 3. Gambar Item Tulang Emas
        for (let i = 0; i < bones.length; i++) {
            let bone = bones[i];
            if (!bone.collected) {
                if (bone.secret) {
                    if (wongi.sniffMode) {
                        ctx.fillStyle = '#ffd700'; // Tampak emas menyala saat diendus
                        ctx.fillRect(bone.x, bone.y, bone.width, bone.height);
                    }
                } else {
                    ctx.fillStyle = wongi.sniffMode ? '#888' : '#ffd700';
                    ctx.fillRect(bone.x, bone.y, bone.width, bone.height);
                }
            }
        }

        // 4. Gambar Musuh (Celeng 🐗)
        for (let i = 0; i < enemies.length; i++) {
            let enemy = enemies[i];
            ctx.fillStyle = wongi.sniffMode ? '#555' : '#8c7ae6'; // Warna ungu/gelap untuk babi hutan
            ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            
            // Variasi mata musuh
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(enemy.direction === 1 ? enemy.x + enemy.width - 8 : enemy.x + 4, enemy.y + 6, 4, 4);
        }

        // 5. Gambar Karakter Utama (Wongi 🐕)
        ctx.fillStyle = wongi.sniffMode ? '#aaa' : wongi.color;
        ctx.fillRect(wongi.x, wongi.y, wongi.width, wongi.height);
        
        // Ekor Wongi
        ctx.fillStyle = wongi.sniffMode ? '#888' : '#d35400';
        ctx.fillRect(wongi.x - 5, wongi.y + 10, 6, 6);
        
        // Mata Wongi (menghadap ke arah jalan)
        ctx.fillStyle = '#000000';
        let eyeOffset = wongi.velX >= 0 ? wongi.width - 8 : 4;
        ctx.fillRect(wongi.x + eyeOffset, wongi.y + 6, 4, 4);

        // 6. Tampilan Kondisi Akhir Game (Overlay Screen)
        if (gameOver) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff4757";
            ctx.font = "bold 30px 'Courier New'";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 10);
            ctx.font = "16px 'Courier New'";
            ctx.fillStyle = "#fff";
            ctx.fillText("Wongi pingsan dihajar Prabu Celeng. Tekan tombol Ulang!", canvas.width/2, canvas.height/2 + 25);
        }

        if (gameWon) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#2ecc71";
            ctx.font = "bold 30px 'Courier New'";
            ctx.textAlign = "center";
            ctx.fillText("VICTORY! TULANG EMAS KEMBALI!", canvas.width/2, canvas.height/2 - 10);
            ctx.font = "16px 'Courier New'";
            ctx.fillStyle = "#fff";
            ctx.fillText("Desa Gemah Ripah Makmur Kembali Berkat Wongi! 🐕", canvas.width/2, canvas.height/2 + 25);
        }
    }

    // --- GAME LOOP ENGINE ---
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop); // Sinkronisasi kelancaran FPS layar
    }

    // Mulai inisialisasi loop pertama kali
    gameLoop();
</script>

</body>
</html>
