<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Super Segawon Mobile Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        body {
            background: #0f171e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: Arial, sans-serif;
            overflow: hidden;
            flex-direction: column;
        }
        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 850 / 400;
            border: 3px solid #ffcc00;
            background: #000;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: linear-gradient(to bottom, #1a0b2e 0%, #4c1c5c 100%);
        }
        /* Tombol Sentuh Virtual Khusus Android/HP */
        .touch-btn {
            position: absolute;
            bottom: 20px;
            right: 30px;
            width: 85px;
            height: 85px;
            background: rgba(255, 204, 0, 0.4);
            border: 4px solid #ffcc00;
            border-radius: 50%;
            color: #fff;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
            z-index: 10;
        }
        .touch-btn:active {
            background: rgba(255, 204, 0, 0.8);
            transform: scale(0.92);
        }
        .score-board {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            background: rgba(0,0,0,0.5);
            padding: 6px 15px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 10;
        }
        /* Instruksi Orientasi Layar */
        .rotate-notice {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: #ffcc00;
            z-index: 999; justify-content: center; align-items: center;
            text-align: center; font-size: 20px; padding: 20px;
        }
        @media (orientation: portrait) {
            .rotate-notice { display: flex; flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="rotate-notice">
        <p>🔄 Silakan miringkan HP kamu (Landscape)<br>untuk memainkan Super Segawon!</p>
    </div>

    <div class="game-wrapper" id="gameWindow">
        <div class="score-board">SKOR: <span id="scoreVal">0</span></div>
        <canvas id="gameCanvas" width="850" height="400"></canvas>
        
        <div class="touch-btn" id="actionBtn">LOMPAT</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gameWindow = document.getElementById("gameWindow");
        const scoreVal = document.getElementById("scoreVal");
        const actionBtn = document.getElementById("actionBtn");

        let score = 0;
        let gameOver = false;
        let gameSpeed = 5.5;
        let particles = [];

        // Karakter Segawon (Beruang)
        const segawon = {
            x: 90,
            y: 290,
            width: 50,
            height: 60,
            velocity: 0,
            gravity: 0.65,
            jumpForce: 14.5,
            isGrounded: true,
            danceTimer: 0
        };

        // Lebah Madu Ungu
        const enemy = {
            x: 950,
            y: 300,
            width: 40,
            height: 40,
            pulse: 0
        };

        // Efek Debu Jalanan
        function createParticle(x, y, color) {
            particles.push({
                x: x, y: y,
                size: Math.random() * 4 + 2,
                speedX: (Math.random() - 0.5) * 4 - 2,
                speedY: (Math.random() - 0.5) * 3,
                life: 1, color: color
            });
        }

        // Trigger Lompat / Restart
        function doAction(e) {
            if(e) e.preventDefault(); // Mencegah double-click bawaan browser mobile
            
            if (gameOver) {
                resetGame();
            } else if (segawon.isGrounded) {
                segawon.velocity = -segawon.jumpForce;
                segawon.isGrounded = false;
                for(let i=0; i<8; i++) createParticle(segawon.x + 25, segawon.y + 60, '#ffcc00');
            }
        }

        // Kontrol Multiplatform (PC & Android)
        actionBtn.addEventListener("touchstart", doAction);
        actionBtn.addEventListener("mousedown", doAction);
        window.addEventListener("keydown", (e) => { if(e.code === "Space") doAction(); });

        function resetGame() {
            score = 0;
            scoreVal.innerText = score;
            gameOver = false;
            gameSpeed = 5.5;
            enemy.x = 950;
            segawon.y = 290;
            segawon.velocity = 0;
            particles = [];
            actionBtn.innerText = "LOMPAT";
            actionBtn.style.background = "rgba(255, 204, 0, 0.4)";
            requestAnimationFrame(update);
        }

        function triggerGameOver() {
            gameOver = true;
            actionBtn.innerText = "MULAI";
            actionBtn.style.background = "rgba(255, 51, 102, 0.6)";
            
            // Efek Getar Layar HP (Hanya bekerja di beberapa browser Android)
            if (navigator.vibrate) navigator.vibrate(150);

            gameWindow.style.animation = "shake 0.2s linear 2";
            setTimeout(() => gameWindow.style.animation = "", 200);

            for(let i=0; i<25; i++) {
                createParticle(segawon.x + 25, segawon.y + 30, '#8B4513');
                createParticle(enemy.x + 20, enemy.y + 20, '#8A2BE2');
            }
        }

        // Main Loop
        function update() {
            if (gameOver) {
                // Gambar Tampilan Game Over Khusus Layar HP
                ctx.fillStyle = "rgba(16, 8, 28, 0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#ff3366";
                ctx.font = "bold 38px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("SEGAWON KALAH!", canvas.width / 2, canvas.height / 2 - 15);

                ctx.fillStyle = "#fff";
                ctx.font = "20px sans-serif";
                ctx.fillText("Skor: " + score, canvas.width / 2, canvas.height / 2 + 25);
                
                ctx.fillStyle = "#ffcc00";
                ctx.font = "16px sans-serif";
                ctx.fillText("Tekan tombol MERAH di kanan bawah", canvas.width / 2, canvas.height / 2 + 65);
                ctx.textAlign = "left";
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Pergerakan Fisika Beruang
            segawon.velocity += segawon.gravity;
            segawon.y += segawon.velocity;

            if (segawon.y >= 290) {
                segawon.y = 290;
                segawon.velocity = 0;
                segawon.isGrounded = true;
                if(Math.random() < 0.15) createParticle(segawon.x, segawon.y + 58, 'rgba(255,255,255,0.3)');
            }

            // Pergerakan Lebah Madu
            enemy.x -= gameSpeed;
            enemy.pulse += 0.15;
            if (enemy.x < -enemy.width) {
                enemy.x = canvas.width + Math.random() * 250;
                score++;
                scoreVal.innerText = score;
                gameSpeed += 0.35;
            }

            // Cek Tabrakan
            if (
                segawon.x + 6 < enemy.x + enemy.width &&
                segawon.x + segawon.width - 6 > enemy.x &&
                segawon.y + 6 < enemy.y + enemy.height &&
                segawon.y + segawon.height > enemy.y
            ) {
                triggerGameOver();
            }

            // Update & Gambar Partikel
            particles.forEach((p, i) => {
                p.x += p.speedX; p.y += p.speedY; p.life -= 0.025;
                if(p.life <= 0) particles.splice(i, 1);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1.0;
            });

            // Gambar Lantai
            ctx.fillStyle = "#1e0b36";
            ctx.fillRect(0, 350, canvas.width, 50);
            ctx.fillStyle = "#ffcc00";
            ctx.fillRect(0, 350, canvas.width, 4);

            // Gambar Segawon (Beruang)
            segawon.danceTimer += 0.25;
            let runBounce = segawon.isGrounded ? Math.sin(segawon.danceTimer) * 2 : 0;
            ctx.fillStyle = "#8B4513";
            ctx.beginPath();
            ctx.roundRect(segawon.x, segawon.y + runBounce, segawon.width, segawon.height, 12);
            ctx.fill();
            // Telinga & Mata
            ctx.fillStyle = "#5c2d0c";
            ctx.beginPath(); ctx.arc(segawon.x + 8, segawon.y + runBounce, 8, 0, Math.PI*2); ctx.arc(segawon.x + 42, segawon.y + runBounce, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000";
            ctx.beginPath(); ctx.arc(segawon.x + 18, segawon.y + 18 + runBounce, 3.5, 0, Math.PI*2); ctx.arc(segawon.x + 34, segawon.y + 18 + runBounce, 3.5, 0, Math.PI*2); ctx.fill();
            // Moncong Hidung
            ctx.fillStyle = "#f5d9a0";
            ctx.beginPath(); ctx.arc(segawon.x + 26, segawon.y + 25 + runBounce, 5, 0, Math.PI*2); ctx.fill();

            // Gambar Lebah Madu Ungu (Glow effect)
            let sizeScale = Math.sin(enemy.pulse) * 2.5;
            ctx.fillStyle = "#8A2BE2";
            ctx.beginPath();
            ctx.roundRect(enemy.x - sizeScale/2, enemy.y - sizeScale/2, enemy.width + sizeScale, enemy.height + sizeScale, 8);
            ctx.fill();
            ctx.fillStyle = "#da70d6"; // Strip kuning/ungu terang
            ctx.fillRect(enemy.x + 10 - sizeScale/2, enemy.y, 6, enemy.height);
            ctx.fillRect(enemy.x + 24 - sizeScale/2, enemy.y, 6, enemy.height);

            requestAnimationFrame(update);
        }

        update();
    </script>
    
    <style>
        @keyframes shake {
            0% { transform: translate(3px, 2px); }
            50% { transform: translate(-3px, -2px); }
            100% { transform: translate(1px, 1px); }
        }
    </style>
</body>
</html>
