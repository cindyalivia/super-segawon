<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Segawon - 2D Arcade Platformer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🐕 SUPER SEGAWON: RUN & JUMP 🐕</h1>
    
    <div class="instruksi">
        <strong>Kontrol:</strong> [← / A] Kiri | [→ / D] Kanan | [↑ / W / Spasi] Lompat | <strong>[S] Sniff Mode</strong> | <strong>[R] Ulang Game</strong>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="hud">
        <div>Tulang Emas: <span id="scoreText">0</span> / 5</div>
        <div>HP: <span id="hpText">100</span>%</div>
        <div>Status Sniff: <span id="sniffText" class="sniff-off">OFF</span></div>
    </div>
    
    <div class="btn-restart-container">
        <button id="restartBtn" class="btn-restart">🔄 Klik untuk Ulang Petualangan</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
