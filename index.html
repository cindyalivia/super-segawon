<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Segawon: Misteri Tulang Emas</title>
    <style>
        :root {
            --bg-color: #1a1a24;
            --container-bg: #252632;
            --screen-bg: #34495e;
            --text-color: #e0e0e0;
            --accent-color: #ffbc42;
            --accent-shadow: #d69615;
        }

        /* Efek Sniff Mode (Monokrom / Hitam Putih) */
        .sniff-active {
            --screen-bg: #2b2b2b;
            filter: grayscale(0.9);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            margin: 0;
        }

        .game-container {
            width: 100%;
            max-width: 700px;
            background: var(--container-bg);
            border: 4px solid #474a5e;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
            text-shadow: 2px 2px #000;
            font-size: 24px;
        }

        .screen {
            background: var(--screen-bg);
            border: 2px solid #1a252f;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        /* Highlight khusus emas saat sniff mode aktif */
        .sniff-active .gold-highlight {
            filter: grayscale(0) !important;
            color: #ffd700 !important;
            font-weight: bold;
            text-shadow: 0 0 5px #ffd700;
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
        }

        .char-box {
            width: 45%;
            background: rgba(0,0,0,0.25);
            padding: 10px;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .hp-bar {
            background: #c0392b;
            height: 15px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
            border: 1px solid #000;
        }

        .hp-fill {
            background: #2ecc71;
            height: 100%;
            width: 100%;
            transition: width 0.3s ease;
        }

        .boss-bar {
            background: #e74c3c;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background: var(--accent-color);
            color: #1a1a24;
            border: none;
            padding: 12px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px var(--accent-shadow);
            font-size: 14px;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px var(--accent-shadow);
        }

        button:disabled {
            background: #555 !important;
            color: #888 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-sniff { background: #3498db; color: white; box-shadow: 0 4px #2980b9; }
        .btn-shop { background: #2ecc71; color: white; box-shadow: 0 4px #27ae60; }
        .btn-danger { background: #e74c3c; color: white; box-shadow: 0 4px #c0392b; }

        .log-box {
            background: #111;
            height: 160px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            font-size: 13px;
            line-height: 1.5;
        }

        .log-entry {
            margin-bottom: 8px;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🐕 SUPER SEGAWON: MISTERI TULANG EMAS 🐕</h1>
    
    <!-- AUDIO VISUAL SCREEN SIMULATION -->
    <div class="screen" id="gameScreen">
        <div class="stats-grid">
            <!-- STATUS WONGI -->
            <div class="char-box">
                <strong>🐾 <span id="wongiNama">Wongi</span></strong> <br>
                <small id="wongiKostum">Skin: Default (Polos)</small>
                <div class="hp-bar">
                    <div class="hp-fill" id="wongiHpFill"></div>
                </div>
                <div style="font-size:12px; margin-top:5px;">HP: <span id="wongiHpText">100/100</span></div>
                <div style="font-size:12px;">🦴 Tulang: <span id="wongiTulangText" class="gold-highlight">10</span></div>
                <div style="font-size:12px;">💥 Power: <span id="wongiDmgText">25</span> DMG</div>
            </div>

            <!-- STATUS BOSS -->
            <div class="char-box" style="text-align: right;">
                <strong>Prabu Celeng 🐗</strong><br>
                <small>Zona: Benteng Akhir</small>
                <div class="hp-bar">
                    <div class="hp-fill boss-bar" id="bossHpFill"></div>
                </div>
                <div style="font-size:12px; margin-top:5px;">HP: <span id="bossHpText">100/100</span></div>
                <div style="font-size:12px; color: #ff6b6b;">Status: Murka</div>
            </div>
        </div>
    </div>

    <!-- PANEL KENDALI (ACTION BUTTONS) -->
    <div class="controls">
        <button id="btnBark" onclick="barkAttack()">🔊 Bark Attack (Woof!)</button>
        <button id="btnSniff" class="btn-sniff" onclick="toggleSniffMode()">👃 Sniff Mode</button>
        <button id="btnShop" class="btn-shop" onclick="beliBlangkon()">🧑‍ Beli Blangkon (40 Tulang)</button>
        <button class="btn-danger" onclick="initGame()">🔄 Mulai Ulang Petualangan</button>
    </div>

    <!-- LOG PERMAINAN -->
    <h3>📜 Log Petualangan:</h3>
    <div class="log-box" id="logBox">
        <!-- Log otomatis diisi oleh JS -->
    </div>
</div>

<script>
    // --- STATE MANAGEMENT ---
    let gameState = {};

    function initGame() {
        gameState = {
            wongi: {
                nama: 'Wongi',
                hp: 100,
                maxHp: 100,
                barkDamage: 25,
                tulang: 10,
                kostum: 'Default (Polos)',
                sniffMode: false
            },
            boss: {
                nama: 'Prabu Celeng 🐗',
                hp: 100,
                maxHp: 100,
                damage: 15
            },
            logs: ["Selamat Datang di Desa Gemah Ripah! Prabu Celeng mencuri Tulang Emas. Ayo rebut kembali!"]
        };
        updateUI();
        renderLogs();
    }

    // --- LOGIKA AKSI ---
    function barkAttack() {
        if (gameState.wongi.hp <= 0 || gameState.boss.hp <= 0) return;

        // Wongi menyerang Boss
        gameState.boss.hp -= gameState.wongi.barkDamage;
        if (gameState.boss.hp < 0) gameState.boss.hp = 0;
        addLog(`🐾 Wongi menggunakan *BARK ATTACK*! 'WOOF WOOF!' Prabu Celeng terkena ${gameState.wongi.barkDamage} DMG.`);

        // Jika Boss masih hidup, balas menyerang
        if (gameState.boss.hp > 0) {
            gameState.wongi.hp -= gameState.boss.damage;
            if (gameState.wongi.hp < 0) gameState.wongi.hp = 0;
            addLog(`🐗 Prabu Celeng menyerang balik! Wongi kehilangan ${gameState.boss.damage} HP.`);
        } else {
            addLog("🎉 Prabu Celeng tumbang! Wongi berhasil merebut kembali TULANG EMAS SAKRAL! Desa Gemah Ripah kembali makmur!");
        }

        if (gameState.wongi.hp <= 0) {
            addLog("😭 Wongi pingsan... Game Over. Desa Gemah Ripah dilanda kekeringan abadi.");
        }

        updateUI();
    }

    function toggleSniffMode() {
        if (gameState.wongi.hp <= 0 || gameState.boss.hp <= 0) return;

        gameState.wongi.sniffMode = !gameState.wongi.sniffMode;
        
        if (gameState.wongi.sniffMode) {
            let dapatTulang = Math.floor(Math.random() * 16) + 15; // Random 15-30
            gameState.wongi.tulang += dapatTulang;
            addLog(`👃 Sniff Mode Aktif! Layar monokrom memperlihatkan jejak <span class="gold-highlight">Tulang Perunggu (+${dapatTulang} 🦴)</span> terkubur di tanah!`);
        } else {
            addLog("👃 Sniff Mode Dinonaktifkan. Pandangan Wongi kembali normal berwarna.");
        }

        updateUI();
    }

    function beliBlangkon() {
        if (gameState.wongi.hp <= 0 || gameState.boss.hp <= 0) return;

        if (gameState.wongi.tulang >= 40) {
            gameState.wongi.tulang -= 40;
            gameState.wongi.kostum = 'Segawon Blangkon 🧑‍';
            gameState.wongi.barkDamage += 15; // Upgrade Damage
            addLog("🛍️ Membeli Blangkon dari Warung Mbok Sri! Penampilan Wongi menjadi sangat gagah & Gonggongan meningkat (+15 DMG)!");
        } else {
            addLog("❌ Tulang Perunggu tidak cukup! Mbok Sri melarang Wongi berutang.");
        }

        updateUI();
    }

    // --- DATA DISPLAY & RENDERERS ---
    function addLog(message) {
        gameState.logs.unshift(message); // Masukkan ke baris paling atas log
        renderLogs();
    }

    function renderLogs() {
        const logBox = document.getElementById('logBox');
        logBox.innerHTML = gameState.logs.map(log => `<div class="log-entry">${log}</div>`).join('');
    }

    function updateUI() {
        const w = gameState.wongi;
        const b = gameState.boss;

        // Update Text & Angka
        document.getElementById('wongiKostum').innerText = `Skin: ${w.kostum}`;
        document.getElementById('wongiHpText').innerText = `${w.hp}/${w.maxHp}`;
        document.getElementById('wongiTulangText').innerText = w.tulang;
        document.getElementById('wongiDmgText').innerText = w.barkDamage;
        document.getElementById('bossHpText').innerText = `${b.hp}/${b.maxHp}`;

        // Update Visual Health Bar (Persentase)
        document.getElementById('wongiHpFill').style.width = `${(w.hp / w.maxHp) * 100}%`;
        document.getElementById('bossHpFill').style.width = `${(b.hp / b.maxHp) * 100}%`;

        // Update Keadaan Layar Sniff Mode
        const screen = document.getElementById('gameScreen');
        if (w.sniffMode) {
            screen.classList.add('sniff-active');
            document.getElementById('btnSniff').innerText = 'Matikan Sniff';
        } else {
            screen.classList.remove('sniff-active');
            document.getElementById('btnSniff').innerText = '👃 Sniff Mode';
        }

        // Cek Game Over / Selesai untuk Kunci Tombol Aksi
        const isGameOver = (w.hp <= 0 || b.hp <= 0);
        document.getElementById('btnBark').disabled = isGameOver;
        document.getElementById('btnSniff').disabled = isGameOver;
        document.getElementById('btnShop').disabled = (isGameOver || w.tulang < 40);
    }

    // Jalankan game saat dokumen siap
    window.onload = initGame;
</script>

</body>
</html>
