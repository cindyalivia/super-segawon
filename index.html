<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Segawon - 2D Arcade Platformer</title>
    <style>
        body {
            background-color: #111216;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
        }
        h1 {
            color: #ffbc42;
            margin-bottom: 5px;
            text-shadow: 2px 2px #000;
            font-size: 24px;
        }
        .instruksi {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
            text-align: center;
            background: #20212b;
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid #333;
        }
        #gameCanvas {
            background: #34495e;
            border: 4px solid #474a5e;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            transition: filter 0.3s ease;
        }
        .sniff-visual { filter: grayscale(100%); }
        .hud {
            width: 800px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            color: #ffbc42;
        }
        .sniff-off { color: #ef476f; }
        .sniff-on { color: #2ecc71; }
        .btn-restart-container { margin-top: 15px; }
        .btn-restart {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px #b33939;
            display: none;
        }
        .btn-restart:active { transform: translateY(2px); box-shadow: 0 2px #b33939; }
    </style>
</head>
<body>

    <h1>🐕 SUPER SEGAWON: RUN & JUMP 🐕</h1>
    
    <div class="instruksi">
        <strong>Kontrol:</strong> [← / A] Kiri | [→ / D] Kanan | [↑ / W / Spasi] Lompat | <strong>[S] Sniff Mode</strong> | <strong>[R] Ulang Game</strong>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="hud">
        <div>Tulang Emas: <span id="scoreText">0</span> / 5</div>
        <div>HP: <span id="hpText">100</span>%</div>
        <div>Status Sniff: <span id="sniffText" class="sniff-off">OFF</span></div>
    </div>
    
    <div class="btn-restart-container">
        <button id="restartBtn" class="btn-restart">🔄 Klik untuk Ulang Petualangan</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const restartBtn = document.getElementById('restartBtn');
        const sniffText = document.getElementById('sniffText');
        const scoreText = document.getElementById('scoreText');
        const hpText = document.getElementById('hpText');

        let score = 0;
        let gameOver = false;
        let gameWon = false;

        const wongi = { x: 50, y: 300, width: 40, height: 30, speed: 5, velX: 0, velY: 0, jumping: false, grounded: false, hp: 100, sniffMode: false, color: '#e67e22' };
        const gravity = 0.6;
        const friction = 0.85;
        const keys = [];

        const platforms = [
            { x: 0, y: 370, width: 800, height: 30, color: '#27ae60' },
            { x: 200, y: 280, width: 120, height: 15, color: '#d35400' },
            { x: 400, y: 200, width: 150, height: 15, color: '#d35400' },
            { x: 650, y: 270, width: 100, height: 15, color: '#d35400' }
        ];

        const bones = [
            { x: 250, y: 240, width: 15, height: 10, collected: false, secret: false },
            { x: 470, y: 160, width: 15, height: 10, collected: false, secret: false },
            { x: 700, y: 230, width: 15, height: 10, collected: false, secret: false },
            { x: 120, y: 330, width: 15, height: 10, collected: false, secret: true },
            { x: 350, y: 330, width: 15, height: 10, collected: false, secret: true }
        ];

        const enemies = [
            { x: 300, y: 340, width: 35, height: 30, speed: 2, range: 100, startX: 300, direction: 1 },
            { x: 600, y: 340, width: 35, height: 30, speed: 3, range: 120, startX: 600, direction: 1 }
        ];

        window.addEventListener('keydown', function (e) {
            keys[e.keyCode] = true;
            if (e.keyCode === 83 && !gameOver && !gameWon) {
                wongi.sniffMode = !wongi.sniffMode;
                if (wongi.sniffMode) {
                    canvas.classList.add('sniff-visual');
                    sniffText.innerText = "ON (MONOKROM)";
                    sniffText.className = "sniff-on";
                } else {
                    canvas.classList.remove('sniff-visual');
                    sniffText.innerText = "OFF";
                    sniffText.className = "sniff-off";
                }
            }
            if (e.keyCode === 82 && (gameOver || gameWon)) resetGame();
        });

        window.addEventListener('keyup', function (e) { keys[e.keyCode] = false; });
        restartBtn.addEventListener('click', resetGame);

        function resetGame() {
            score = 0; gameOver = false; gameWon = false;
            wongi.x = 50; wongi.y = 300; wongi.velX = 0; wongi.velY = 0; wongi.jumping = false; wongi.grounded = false; wongi.hp = 100; wongi.sniffMode = false;
            canvas.classList.remove('sniff-visual');
            sniffText.innerText = "OFF"; sniffText.className = "sniff-off";
            bones.forEach(b => b.collected = false);
            enemies.forEach(e => { e.x = e.startX; e.direction = 1; });
            restartBtn.style.display = 'none';
        }

        function update() {
            if (gameOver || gameWon) { restartBtn.style.display = 'block'; return; }
            if (keys[39] || keys[68]) { if (wongi.velX < wongi.speed) wongi.velX++; }
            if (keys[37] || keys[65]) { if (wongi.velX > -wongi.speed) wongi.velX--; }
            if ((keys[38] || keys[87] || keys[32]) && !wongi.jumping && wongi.grounded) { wongi.jumping = true; wongi.grounded = false; wongi.velY = -wongi.speed * 2.5; }

            wongi.velX *= friction; wongi.velY += gravity; wongi.x += wongi.velX; wongi.y += wongi.velY;
            if (wongi.x >= canvas.width - wongi.width) wongi.x = canvas.width - wongi.width;
            if (wongi.x <= 0) wongi.x = 0;

            wongi.grounded = false;
            platforms.forEach(plat => {
                if (wongi.x < plat.x + plat.width && wongi.x + wongi.width > plat.x && wongi.y < plat.y + plat.height && wongi.y + wongi.height > plat.y) {
                    if (wongi.velY > 0 && (wongi.y + wongi.height - wongi.velY) <= plat.y) { wongi.grounded = true; wongi.jumping = false; wongi.y = plat.y - wongi.height; wongi.velY = 0; }
                }
            });

            enemies.forEach(enemy => {
                enemy.x += enemy.speed * enemy.direction;
                if (Math.abs(enemy.x - enemy.startX) > enemy.range) enemy.direction *= -1;
                if (wongi.x < enemy.x + enemy.width && wongi.x + wongi.width > enemy.x && wongi.y < enemy.y + enemy.height && wongi.y + wongi.height > enemy.y) {
                    wongi.hp -= 1.5; wongi.velY = -5; wongi.velX = enemy.direction * 4;
                    if (wongi.hp <= 0) { wongi.hp = 0; gameOver = true; }
                }
            });

            bones.forEach(bone => {
                if (bone.secret && !wongi.sniffMode) return;
                if (!bone.collected && wongi.x < bone.x + bone.width && wongi.x + wongi.width > bone.x && wongi.y < bone.y + bone.height && wongi.y + wongi.height > bone.y) {
                    bone.collected = true; score++;
                    if (score >= 5) gameWon = true;
                }
            });

            scoreText.innerText = score; hpText.innerText = Math.floor(wongi.hp);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = wongi.sniffMode ? '#1e1e1e' : '#34495e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            platforms.forEach(plat => { ctx.fillStyle = wongi.sniffMode ? '#444' : plat.color; ctx.fillRect(plat.x, plat.y, plat.width, plat.height); });
            bones.forEach(bone => {
                if (!bone.collected) {
                    if (bone.secret && !wongi.sniffMode) return;
                    ctx.fillStyle = bone.secret ? '#ffd700' : (wongi.sniffMode ? '#888' : '#ffd700');
                    ctx.fillRect(bone.x, bone.y, bone.width, bone.height);
                }
            });

            enemies.forEach(enemy => {
                ctx.fillStyle = wongi.sniffMode ? '#555' : '#8c7ae6'; ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                ctx.fillStyle = '#ff0000'; ctx.fillRect(enemy.direction === 1 ? enemy.x + enemy.width - 8 : enemy.x + 4, enemy.y + 6, 4, 4);
            });

            ctx.fillStyle = wongi.sniffMode ? '#aaa' : wongi.color; ctx.fillRect(wongi.x, wongi.y, wongi.width, wongi.height);
            ctx.fillStyle = wongi.sniffMode ? '#888' : '#d35400'; ctx.fillRect(wongi.x - 5, wongi.y + 10, 6, 6);
            ctx.fillStyle = '#000000'; let eyeOffset = wongi.velX >= 0 ? wongi.width - 8 : 4; ctx.fillRect(wongi.x + eyeOffset, wongi.y + 6, 4, 4);

            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff4757"; ctx.font = "bold 30px 'Courier New'"; ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 10);
                ctx.font = "16px 'Courier New'"; ctx.fillStyle = "#fff"; ctx.fillText("Wongi pingsan. Tekan [R] atau klik tombol!", canvas.width/2, canvas.height/2 + 25);
            }

            if (gameWon) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#2ecc71"; ctx.font = "bold 26px 'Courier New'"; ctx.textAlign = "center";
                ctx.fillText("VICTORY!", canvas.width/2, canvas.height/2 - 10);
                ctx.font = "16px 'Courier New'"; ctx.fillStyle = "#fff"; ctx.fillText("Desa Damai Kembali! Tekan [R] untuk Main Lagi.", canvas.width/2, canvas.height/2 + 25);
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        gameLoop();
    </script>
</body>
</html>
